<h1 class="text-3xl font-bold underline" style="padding-top: 3rem; padding-bottom: 3rem">
  CRUD - Mariana App
</h1>

# Listar usuarios

<p-table [value]="users" [tableStyle]="{ 'min-width': '50rem' }">
  <ng-template #header>
    <tr>
      <th>Id</th>
      <th>Nombre</th>
      <th>Email</th>
      <th>Acciones</th>
    </tr>
  </ng-template>
  <ng-template #body let-user>
    <tr>
      <td>{{ user.id }}</td>
      <td>{{ user.name }}</td>
      <td>{{ user.email }}</td>
      <td>
        <button
          pButton
          type="button"
          label="Editar"
          class="p-button-rounded p-button-success"
        ></button>
        <button
          pButton
          type="button"
          label="Eliminar"
          class="p-button-rounded p-button-danger"
        ></button>
      </td>
    </tr>
  </ng-template>
</p-table>

<h1 class="text-3xl font-bold underline" style="padding-top: 3rem; padding-bottom: 3rem">
  Registrar un usuario
</h1>

<div class="p-fluid" style="max-width: 400px">
  <div class="p-field" style="margin-bottom: 1rem">
    <label for="nombre">Nombre</label>
    <input id="nombre" type="text" pInputText [(ngModel)]="text1" placeholder="Ingrese nombre" />
  </div>

  <div class="p-field" style="margin-bottom: 1rem">
    <label for="correo">Correo</label>
    <input id="correo" type="email" pInputText [(ngModel)]="text2" placeholder="Ingrese correo" />
  </div>

  <button
    pButton
    type="button"
    label="Guardar"
    class="p-button-primary"
    (click)="crearUsuario()"
  ></button>
</div>
